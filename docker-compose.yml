version: "3.9"

# ============================================================
# Intelligent Loan Disbursement System — Docker Compose
# ============================================================

x-common-env: &common-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: ${POSTGRES_DB:-loan_db}
  POSTGRES_USER: ${POSTGRES_USER:-loan_user}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
  DATABASE_URL: ${DATABASE_URL:-postgresql://loan_user:changeme@postgres:5432/loan_db}
  REDIS_STREAMS_URL: ${REDIS_STREAMS_URL:-redis://redis:6379/0}
  REDIS_CELERY_URL: ${REDIS_CELERY_URL:-redis://redis:6379/1}
  REDIS_CACHE_URL: ${REDIS_CACHE_URL:-redis://redis:6379/2}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  ENVIRONMENT: ${ENVIRONMENT:-development}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

networks:
  loan-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  uploads:

services:
  # ── Infrastructure ─────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    container_name: loan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-loan_db}
      POSTGRES_USER: ${POSTGRES_USER:-loan_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - loan-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-loan_user} -d ${POSTGRES_DB:-loan_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: loan-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - loan-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ────────────────────────────────────────────

  backend-api:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    container_name: loan-backend-api
    restart: unless-stopped
    environment:
      <<: *common-env
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      AGENT_SERVICE_URL: ${AGENT_SERVICE_URL:-http://agent-service:8001}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      LOCAL_STORAGE_PATH: /app/uploads
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
    networks:
      - loan-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    develop:
      watch:
        - action: sync
          path: ./backend-api
          target: /app
          ignore:
            - __pycache__/
            - "*.pyc"
        - action: rebuild
          path: ./backend-api/requirements.txt

  # ── Agent Service ──────────────────────────────────────────

  agent-service:
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    container_name: loan-agent-service
    volumes:
    - uploads:/app/uploads
    restart: unless-stopped
    environment:
      <<: *common-env
      HITL_THRESHOLD: ${HITL_THRESHOLD:-1000000}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
      RAG_COLLECTION_NAME: ${RAG_COLLECTION_NAME:-compliance_policies}
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend-api:8000}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://notification-service:8002}
    ports:
      - "8001:8001"
    networks:
      - loan-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    develop:
      watch:
        - action: sync
          path: ./agent-service
          target: /app
          ignore:
            - __pycache__/
            - "*.pyc"
        - action: rebuild
          path: ./agent-service/requirements.txt

  agent-worker:
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    container_name: loan-agent-worker
    volumes:
    - uploads:/app/uploads
    restart: unless-stopped
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=4 -Q agent
    environment:
      <<: *common-env
      HITL_THRESHOLD: ${HITL_THRESHOLD:-1000000}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend-api:8000}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://notification-service:8002}
    networks:
      - loan-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./agent-service
          target: /app
          ignore:
            - __pycache__/
            - "*.pyc"

  # ── Notification Service ───────────────────────────────────

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: loan-notification-service
    restart: unless-stopped
    environment:
      <<: *common-env
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      TWILIO_WHATSAPP_NUMBER: ${TWILIO_WHATSAPP_NUMBER}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-noreply@loanservice.example.com}
      SENDGRID_FROM_NAME: ${SENDGRID_FROM_NAME:-Loan Disbursement System}
    ports:
      - "8002:8002"
    networks:
      - loan-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    develop:
      watch:
        - action: sync
          path: ./notification-service
          target: /app
          ignore:
            - __pycache__/
            - "*.pyc"
        - action: rebuild
          path: ./notification-service/requirements.txt

  notification-worker:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: loan-notification-worker
    restart: unless-stopped
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=2 -Q notifications
    environment:
      <<: *common-env
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      TWILIO_WHATSAPP_NUMBER: ${TWILIO_WHATSAPP_NUMBER}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-noreply@loanservice.example.com}
    networks:
      - loan-net
    depends_on:
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: loan-celery-beat
    restart: unless-stopped
    command: celery -A worker.celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    environment:
      <<: *common-env
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
    networks:
      - loan-net
    depends_on:
      redis:
        condition: service_healthy

  # ── Frontend ───────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: loan-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - loan-net
    depends_on:
      - backend-api
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
        - action: rebuild
          path: ./frontend/package.json
